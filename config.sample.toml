# tuwunel-admin config
[server]
bind = "0.0.0.0:8080"


[matrix]
# Homeserver base URLs offered on the login page. The user picks one from a dropdown.
# Leave empty and set allow_any_server = true to let users type any URL.
homeservers = ["https://chat.example.net"]

# If true, show an input on the login page so users can override / enter a custom URL.
# If false, only the configured homeservers are accepted.
#
# IMPORTANT: Enabling this option can lead to security issues if users enters malicious (or private) URLs.
#            Only enable this in a secure trusted environment.
allow_any_server = false

# Bot user in the admin room. Conduwuit/tuwunel convention is the server localpart.
# e.g. for chat.example.net: "@tuwunel:chat.example.net" or "@conduit:chat.example.net".
# Leave empty to auto-detect from the first non-self sender in the admin room.
admin_bot = ""

# Admin room alias. Default for conduwuit/tuwunel is "#admins:{server_name}".
# Leave empty to auto-derive.
admin_room_alias = ""

# Device ID to use when logging in.
device_id = "tuwunel-admin"
device_display_name = "tuwunel-admin"
