version: 2
project_name: tuwunel-admin

before:
  hooks:
    - rustup default stable
    - cargo install --locked cargo-zigbuild
    - cargo fetch --locked

builds:
  - builder: rust
    targets:
      - x86_64-unknown-linux-musl
      - aarch64-unknown-linux-musl

archives:
  - formats:
      - tar.gz
    # Include Target to differentiate gnu vs musl builds
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Target }}"
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE
      - config.sample.toml
      - static/**
      - templates/**

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
