{% if flash %}
  <div role="alert" class="mb-6" data-variant="{% if flash.kind == 'error' %}danger{% else %}success{% endif %}">
    <p style="white-space:pre-wrap;margin:0">{{ flash.text }}</p>
  </div>
{% endif %}
{% if log_has_error %}
  <div role="alert" class="mb-6" data-variant="danger">
    <p>One or more admin commands on this page failed. See the console log below.</p>
  </div>
{% endif %}
{% if error %}<div role="alert" class="mb-6" data-variant="danger">{{ error }}</div>{% endif %}
